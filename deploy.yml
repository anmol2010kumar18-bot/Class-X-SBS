name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main  # Runs every time you push to main branch

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Download your repo code
      - name: Checkout code
        uses: actions/checkout@v3

      # Step 2: Generate config.js from GitHub Secrets
      - name: Create config.js from secrets
        run: |
          cat > config.js << 'EOF'
          window._APP_CONFIG = {
            firebase: {
              apiKey:            "${{ secrets.FIREBASE_API_KEY }}",
              authDomain:        "${{ secrets.FIREBASE_AUTH_DOMAIN }}",
              databaseURL:       "${{ secrets.FIREBASE_DATABASE_URL }}",
              projectId:         "${{ secrets.FIREBASE_PROJECT_ID }}",
              storageBucket:     "${{ secrets.FIREBASE_STORAGE_BUCKET }}",
              messagingSenderId: "${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}",
              appId:             "${{ secrets.FIREBASE_APP_ID }}"
            },
            groqKey: "${{ secrets.GROQ_API_KEY }}"
          };
          EOF

      # Step 3: Deploy everything to GitHub Pages
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          exclude_assets: '.github,config.example.js,.gitignore'