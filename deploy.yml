name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      # Generate config.js — uses double-quotes so secret is actually substituted
      - name: Create config.js from secrets
        run: |
          echo "window._APP_CONFIG = { groqKey: \"$GROQ_KEY\" };" > config.js
        env:
          GROQ_KEY: ${{ secrets.GROQ_API_KEY }}

      # Deploy everything to GitHub Pages
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          exclude_assets: '.github,config.example.js,.gitignore'